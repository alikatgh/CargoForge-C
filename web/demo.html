<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CargoForge-C — Interactive Demo</title>
<style>
:root {
  --bg: #0f1117;
  --surface: #1a1d27;
  --border: #2a2d3a;
  --text: #e1e4ed;
  --muted: #8b8fa3;
  --accent: #4f8ff7;
  --green: #34d399;
  --red: #f87171;
  --yellow: #fbbf24;
  --orange: #fb923c;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', monospace;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  min-height: 100vh;
  overflow-x: hidden;
}
.container { width: 100%; max-width: 1200px; margin: 0 auto; padding: 16px; }
@media (min-width: 640px) { .container { padding: 24px; } }

header {
  border-bottom: 1px solid var(--border);
  padding-bottom: 12px;
  margin-bottom: 16px;
}
header h1 { font-size: 1.25rem; color: var(--accent); }
header p { color: var(--muted); font-size: 0.8rem; margin-top: 4px; line-height: 1.4; }
@media (min-width: 640px) {
  header { padding-bottom: 16px; margin-bottom: 24px; }
  header h1 { font-size: 1.5rem; }
  header p { font-size: 0.85rem; }
}

.grid { display: grid; grid-template-columns: 1fr; gap: 16px; }
@media (min-width: 640px) { .grid { gap: 24px; } }
@media (min-width: 900px) { .grid { grid-template-columns: 1fr 1fr; } }

.panel {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 14px;
}
@media (min-width: 640px) { .panel { padding: 20px; } }
.panel h2 {
  font-size: 0.8rem;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  margin-bottom: 12px;
}
@media (min-width: 640px) { .panel h2 { font-size: 0.9rem; margin-bottom: 16px; } }

label {
  display: block;
  font-size: 0.75rem;
  color: var(--muted);
  margin-bottom: 4px;
  margin-top: 10px;
}
label:first-of-type { margin-top: 0; }
input, textarea, select {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 10px 12px;
  border-radius: 4px;
  font-family: inherit;
  font-size: 0.85rem;
  -webkit-appearance: none;
  appearance: none;
}
input:focus, textarea:focus {
  outline: none;
  border-color: var(--accent);
}
textarea { resize: vertical; min-height: 140px; }

.row { display: flex; gap: 10px; }
.row > div { flex: 1; min-width: 0; }

.actions { display: flex; gap: 10px; margin-top: 16px; flex-wrap: wrap; }
button {
  display: block;
  width: 100%;
  background: var(--accent);
  color: #fff;
  border: none;
  padding: 12px 24px;
  border-radius: 6px;
  font-family: inherit;
  font-size: 0.9rem;
  cursor: pointer;
  font-weight: 600;
}
@media (min-width: 480px) { button { display: inline-block; width: auto; } }
button:hover { opacity: 0.9; }
button:active { opacity: 0.8; }

.btn-secondary {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--muted);
  padding: 10px 16px;
  font-size: 0.85rem;
}
.btn-secondary:hover { border-color: var(--accent); color: var(--text); }

#results { margin-top: 16px; display: none; }
#results.visible { display: block; }
@media (min-width: 640px) { #results { margin-top: 24px; } }

.results-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 16px;
}
@media (min-width: 640px) { .results-grid { gap: 16px; margin-bottom: 24px; } }
@media (min-width: 900px) { .results-grid { grid-template-columns: repeat(3, 1fr); } }

.stat-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px;
}
@media (min-width: 640px) { .stat-card { padding: 16px; } }
.stat-card .label { font-size: 0.7rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.04em; }
.stat-card .value { font-size: 1.15rem; font-weight: 700; margin-top: 4px; word-break: break-all; }
@media (min-width: 640px) { .stat-card .value { font-size: 1.4rem; } }
.stat-card .sub { font-size: 0.7rem; color: var(--muted); margin-top: 2px; }

.status-ok { color: var(--green); }
.status-warn { color: var(--yellow); }
.status-fail { color: var(--red); }

.cargo-table { width: 100%; border-collapse: collapse; font-size: 0.75rem; }
.cargo-table th {
  text-align: left;
  padding: 6px 8px;
  border-bottom: 2px solid var(--border);
  color: var(--muted);
  font-weight: 600;
  text-transform: uppercase;
  font-size: 0.65rem;
  letter-spacing: 0.04em;
  white-space: nowrap;
}
.cargo-table td { padding: 6px 8px; border-bottom: 1px solid var(--border); }
.cargo-table tr:hover td { background: rgba(79,143,247,0.05); }

.imo-table { width: 100%; font-size: 0.78rem; }
.imo-table td { padding: 5px 8px; border-bottom: 1px solid var(--border); }
.imo-table td:last-child { text-align: right; font-weight: 600; }

.viz-canvas {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 4px;
  width: 100%;
  height: 160px;
  display: block;
}
@media (min-width: 640px) { .viz-canvas { height: 200px; } }

.error-msg {
  background: rgba(248,113,113,0.1);
  border: 1px solid var(--red);
  color: var(--red);
  padding: 12px;
  border-radius: 6px;
  font-size: 0.85rem;
  margin-top: 16px;
}

.sample-link {
  color: var(--accent);
  cursor: pointer;
  text-decoration: underline;
  font-size: 0.8rem;
}
.sample-link:hover { opacity: 0.8; }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>CargoForge-C Interactive Demo</h1>
    <p>Browser-based JS port of the core C algorithms. <a href="./" style="color:var(--accent)">Back to docs</a> &middot; <a href="https://github.com/alikatgh/CargoForge-C" style="color:var(--accent)">GitHub</a></p>
  </header>

  <div class="grid">
    <div class="panel">
      <h2>Ship Configuration</h2>
      <div class="row">
        <div>
          <label>Length (m)</label>
          <input type="number" id="ship-length" value="150" step="0.1" min="1">
        </div>
        <div>
          <label>Width (m)</label>
          <input type="number" id="ship-width" value="25" step="0.1" min="1">
        </div>
      </div>
      <div class="row">
        <div>
          <label>Max Weight (t)</label>
          <input type="number" id="ship-maxweight" value="50000" step="1" min="1">
        </div>
        <div>
          <label>Lightship Weight (t)</label>
          <input type="number" id="ship-lightship" value="2000" step="1" min="1">
        </div>
      </div>
      <label>Lightship KG (m above keel)</label>
      <input type="number" id="ship-kg" value="8.0" step="0.1" min="0.1">
    </div>

    <div class="panel">
      <h2>Cargo Manifest <span class="sample-link" onclick="loadSample()">(load sample)</span></h2>
      <label>Format: ID Weight(t) LxWxH Type &mdash; one per line</label>
      <textarea id="cargo-input" rows="10" placeholder="HeavyMachinery 550 20x5x3 standard
ContainerA 250 12.2x2.4x2.6 reefer
HazChem 100 3x2x2 hazardous"></textarea>
      <p style="color:var(--muted);font-size:0.75rem;margin-top:6px">Types: standard, hazardous, reefer, fragile, heavy, bulk</p>
    </div>
  </div>

  <div class="actions" style="margin-top:16px">
    <button onclick="runOptimizer()">Run Optimization</button>
    <button class="btn-secondary" onclick="clearResults()">Clear</button>
  </div>

  <div id="error-box" class="error-msg" style="display:none"></div>

  <div id="results">
    <div class="results-grid" id="stat-cards"></div>
    <div class="panel">
      <h2>Top-Down Cargo Layout</h2>
      <canvas id="viz" class="viz-canvas"></canvas>
    </div>
    <div class="panel" style="margin-top:16px">
      <h2>IMO Intact Stability (MSC.267/85)</h2>
      <table class="imo-table" id="imo-table"></table>
    </div>
    <div class="panel" style="margin-top:16px">
      <h2>Cargo Placement Details</h2>
      <div style="overflow-x:auto">
        <table class="cargo-table" id="cargo-table"></table>
      </div>
    </div>
  </div>
</div>

<script>
const SEAWATER_DENSITY = 1.025;
const BLOCK_COEFF = 0.75;
const WATERPLANE_COEFF = 0.85;
const KB_FACTOR = 0.53;
const MIN_HAZMAT_SEP = 3.0;
const MAX_DECK_RATIO = 0.3;
const MAX_POINT_LOAD = 1000;
const MAX_STACK_PRESSURE = 20;
const MAX_STACK_FRAGILE = 5;

function parseCargoLines(text) {
  const items = [];
  for (const raw of text.split('\n')) {
    const line = raw.trim();
    if (!line || line.startsWith('#')) continue;
    const parts = line.split(/\s+/);
    if (parts.length < 4) continue;
    const dims = parts[2].split('x').map(Number);
    if (dims.length !== 3 || dims.some(isNaN)) continue;
    const w = parseFloat(parts[1]);
    if (isNaN(w) || w <= 0) continue;
    items.push({ id: parts[0], weight: w * 1000, dims, type: parts[3] || 'standard', px: -1, py: -1, pz: -1 });
  }
  return items;
}

function isHazardous(c) { return c.type === 'hazardous'; }
function isFragile(c) { return c.type === 'fragile'; }

function checkHazmatSep(cargo, items, x, y, z) {
  if (!isHazardous(cargo)) return true;
  for (const c of items) {
    if (c.px < 0 || c === cargo) continue;
    if (isHazardous(c)) {
      const d = Math.sqrt((c.px-x)**2 + (c.py-y)**2 + (c.pz-z)**2);
      if (d < MIN_HAZMAT_SEP) return false;
    }
  }
  return true;
}

function calcStackPressure(items, x, y, z, w, d) {
  const fp = w * d;
  if (fp < 0.01) return 0;
  let wt = 0;
  for (const c of items) {
    if (c.px < 0 || c.pz <= z) continue;
    const ox = Math.min(c.px+c.dims[0], x+w) - Math.max(c.px, x);
    const oy = Math.min(c.py+c.dims[1], y+d) - Math.max(c.py, y);
    if (ox > 0 && oy > 0) {
      const ca = c.dims[0] * c.dims[1];
      if (ca > 0.01) wt += (c.weight/1000) * (ox*oy)/ca;
    }
  }
  return wt / fp;
}

function checkConstraints(ship, cargo, items, bin, space) {
  const area = cargo.dims[0] * cargo.dims[1];
  if (area > 0.01 && (cargo.weight/1000)/area > MAX_POINT_LOAD) return false;
  if (isHazardous(cargo) && !checkHazmatSep(cargo, items, space.x, space.y, space.z)) return false;
  const sp = calcStackPressure(items, space.x, space.y, space.z, cargo.dims[0], cargo.dims[1]);
  const maxP = isFragile(cargo) ? MAX_STACK_FRAGILE : MAX_STACK_PRESSURE;
  if (sp > maxP) return false;
  if (bin.name === 'Deck') {
    if ((bin.curWeight + cargo.weight) / (ship.maxWeight*1000) > MAX_DECK_RATIO) return false;
  }
  return true;
}

function getOrientDims(c, o) {
  const d = c.dims;
  const perms = [[0,1,2],[0,2,1],[1,0,2],[1,2,0],[2,0,1],[2,1,0]];
  const p = perms[o];
  return [d[p[0]], d[p[1]], d[p[2]]];
}

function placeCargo3D(ship, items) {
  items.sort((a,b) => {
    const va = a.dims[0]*a.dims[1]*a.dims[2];
    const vb = b.dims[0]*b.dims[1]*b.dims[2];
    return vb - va;
  });
  const L = ship.length, W = ship.width, maxW = ship.maxWeight * 1000;
  const bins = [
    { name:'ForwardHold', x:0, y:0, z:-8, w:L*0.3, d:W*0.8, h:8, maxW:maxW*0.3, curWeight:0, spaces:[{x:0,y:0,z:-8,w:L*0.3,d:W*0.8,h:8,free:true}] },
    { name:'AftHold', x:L*0.7, y:0, z:-8, w:L*0.3, d:W*0.8, h:8, maxW:maxW*0.3, curWeight:0, spaces:[{x:L*0.7,y:0,z:-8,w:L*0.3,d:W*0.8,h:8,free:true}] },
    { name:'Deck', x:0, y:0, z:0, w:L, d:W, h:4, maxW:maxW*0.4, curWeight:0, spaces:[{x:0,y:0,z:0,w:L,d:W,h:4,free:true}] }
  ];
  let placed = 0;
  for (const cargo of items) {
    let bestBin=-1, bestSpace=-1, bestOri=-1, bestVol=1e18;
    for (let b=0; b<bins.length; b++) {
      const bin = bins[b];
      if (bin.curWeight + cargo.weight > bin.maxW) continue;
      for (let s=0; s<bin.spaces.length; s++) {
        const sp = bin.spaces[s];
        if (!sp.free) continue;
        if (!checkConstraints(ship, cargo, items, bin, sp)) continue;
        for (let o=0; o<6; o++) {
          const [cw,cd,ch] = getOrientDims(cargo, o);
          if (cw<=sp.w && cd<=sp.d && ch<=sp.h) {
            const v = sp.w*sp.d*sp.h;
            if (v < bestVol) { bestVol=v; bestBin=b; bestSpace=s; bestOri=o; }
          }
        }
      }
    }
    if (bestBin >= 0) {
      const bin = bins[bestBin];
      const sp = bin.spaces[bestSpace];
      cargo.px = sp.x; cargo.py = sp.y; cargo.pz = sp.z;
      cargo.bin = bin.name;
      bin.curWeight += cargo.weight;
      const [cw,cd,ch] = getOrientDims(cargo, bestOri);
      sp.free = false;
      if (sp.w > cw) bin.spaces.push({x:sp.x+cw, y:sp.y, z:sp.z, w:sp.w-cw, d:sp.d, h:sp.h, free:true});
      if (sp.d > cd) bin.spaces.push({x:sp.x, y:sp.y+cd, z:sp.z, w:cw, d:sp.d-cd, h:sp.h, free:true});
      if (sp.h > ch) bin.spaces.push({x:sp.x, y:sp.y, z:sp.z+ch, w:cw, d:cd, h:sp.h-ch, free:true});
      placed++;
    }
  }
  return { bins, placed };
}

function gzAtAngle(gm, bm, deg) {
  const th = deg * Math.PI / 180;
  const t = Math.tan(th);
  return Math.sin(th) * (gm + bm * t * t / 2);
}

function integrateGZ(gm, bm, start, end) {
  const steps = 100;
  const step = (end - start) / steps;
  let area = 0;
  for (let i = 0; i < steps; i++) {
    const a1 = start + i * step;
    const a2 = a1 + step;
    let gz1 = gzAtAngle(gm, bm, a1); if (gz1<0) gz1=0;
    let gz2 = gzAtAngle(gm, bm, a2); if (gz2<0) gz2=0;
    area += (gz1+gz2)*0.5 * (step * Math.PI/180);
  }
  return area;
}

function performAnalysis(ship, items) {
  const r = { cg_x:50, cg_y:50, cargoWt:0, placed:0, draft:0, gm:0, kb:0, bm:0, kg:0, trim:0, heel:0, lcg:0, gz30:0, gzMax:0, gzMaxAngle:0, a030:0, a040:0, a3040:0, imoOk:false };
  let mx=0, my=0, vmom=ship.lightshipWeight*1000*ship.lightshipKG, lcgMom=0;
  for (const c of items) {
    if (c.px < 0) continue;
    r.placed++;
    r.cargoWt += c.weight;
    const cx = c.px+c.dims[0]/2, cy = c.py+c.dims[1]/2, cz = c.pz+c.dims[2]/2;
    mx += c.weight * cx;
    my += c.weight * cy;
    vmom += c.weight * cz;
    lcgMom += c.weight * (cx - ship.length/2);
  }
  const disp = ship.lightshipWeight*1000 + r.cargoWt;
  if (disp > ship.maxWeight*1000) { r.gm = NaN; return r; }
  if (r.cargoWt > 0.01) {
    r.cg_x = (mx/r.cargoWt)/ship.length*100;
    r.cg_y = (my/r.cargoWt)/ship.width*100;
  }
  const dispT = disp/1000;
  const vol = dispT / SEAWATER_DENSITY;
  r.draft = vol / (ship.length * ship.width * BLOCK_COEFF);
  r.kb = KB_FACTOR * r.draft;
  r.kg = vmom / disp;
  const it = (ship.length * Math.pow(ship.width,3)/12) * WATERPLANE_COEFF;
  r.bm = it / vol;
  r.gm = r.kb + r.bm - r.kg;
  r.lcg = lcgMom / disp;
  const il = (ship.width * Math.pow(ship.length,3)/12) * WATERPLANE_COEFF;
  const bml = il / vol;
  const gml = r.kb + bml - r.kg;
  if (gml > 0.01) r.trim = r.lcg * ship.length / gml;
  if (r.cargoWt > 0.01) {
    const tcg = (my/r.cargoWt) - ship.width/2;
    if (r.gm > 0.01) r.heel = Math.atan(tcg/r.gm) * 180/Math.PI;
  }
  r.gz30 = gzAtAngle(r.gm, r.bm, 30);
  r.gzMax=0; r.gzMaxAngle=0;
  for (let a=1; a<=80; a++) {
    const gz = gzAtAngle(r.gm, r.bm, a);
    if (gz > r.gzMax) { r.gzMax=gz; r.gzMaxAngle=a; }
  }
  r.a030 = integrateGZ(r.gm, r.bm, 0, 30);
  r.a040 = integrateGZ(r.gm, r.bm, 0, 40);
  r.a3040 = integrateGZ(r.gm, r.bm, 30, 40);
  r.imoOk = r.gm>=0.15 && r.gz30>=0.20 && r.gzMaxAngle>=25 && r.a030>=0.055 && r.a040>=0.090 && r.a3040>=0.030;
  return r;
}

function loadSample() {
  document.getElementById('ship-length').value = '150';
  document.getElementById('ship-width').value = '25';
  document.getElementById('ship-maxweight').value = '50000';
  document.getElementById('ship-lightship').value = '2000';
  document.getElementById('ship-kg').value = '8.0';
  document.getElementById('cargo-input').value =
`HeavyMachinery 550 20x5x3 standard
SteelBeams 400 18x2x2 bulk
ContainerA 250 12.2x2.4x2.6 reefer
ContainerB 250 12.2x2.4x2.6 reefer
SmallCrate 50 2x2x2 standard
HazChem1 80 3x2x2 hazardous
HazChem2 60 2.5x2x1.5 hazardous
GlassPanel 30 4x3x1 fragile
Electronics 45 3x2.5x2 fragile
BulkGrain 500 15x4x4 bulk
Timber 300 12x3x3 standard
Machinery2 200 8x4x3 heavy`;
}

function clearResults() {
  document.getElementById('results').classList.remove('visible');
  document.getElementById('error-box').style.display = 'none';
}

function showError(msg) {
  const box = document.getElementById('error-box');
  box.textContent = msg;
  box.style.display = 'block';
  document.getElementById('results').classList.remove('visible');
}

function runOptimizer() {
  document.getElementById('error-box').style.display = 'none';
  const ship = {
    length: parseFloat(document.getElementById('ship-length').value),
    width: parseFloat(document.getElementById('ship-width').value),
    maxWeight: parseFloat(document.getElementById('ship-maxweight').value),
    lightshipWeight: parseFloat(document.getElementById('ship-lightship').value),
    lightshipKG: parseFloat(document.getElementById('ship-kg').value)
  };
  if (Object.values(ship).some(v => isNaN(v) || v <= 0)) {
    return showError('Invalid ship configuration. All values must be positive numbers.');
  }
  const cargoText = document.getElementById('cargo-input').value.trim();
  if (!cargoText) return showError('Please enter cargo data.');
  const items = parseCargoLines(cargoText);
  if (items.length === 0) return showError('No valid cargo lines found. Format: ID Weight(t) LxWxH Type');
  const { bins, placed } = placeCargo3D(ship, items);
  const analysis = performAnalysis(ship, items);
  if (isNaN(analysis.gm)) {
    return showError('PLAN REJECTED: Total weight exceeds ship maximum capacity.');
  }
  renderResults(ship, items, bins, analysis);
}

function renderResults(ship, items, bins, a) {
  const el = document.getElementById('results');
  el.classList.add('visible');
  let gmStatus, gmClass;
  if (a.gm < 0.3) { gmStatus='CRITICAL'; gmClass='status-fail'; }
  else if (a.gm > 3) { gmStatus='Too Stiff'; gmClass='status-warn'; }
  else if (a.gm >= 0.5 && a.gm <= 2.5) { gmStatus='Optimal'; gmClass='status-ok'; }
  else { gmStatus='Acceptable'; gmClass='status-ok'; }
  const dispT = (ship.lightshipWeight*1000 + a.cargoWt)/1000;
  document.getElementById('stat-cards').innerHTML = `
    <div class="stat-card"><div class="label">Placed / Total</div><div class="value">${a.placed} / ${items.length}</div><div class="sub">${(a.placed/items.length*100).toFixed(0)}% placement rate</div></div>
    <div class="stat-card"><div class="label">Displacement</div><div class="value">${dispT.toFixed(0)} t</div><div class="sub">${(dispT*1000/ship.maxWeight/10).toFixed(1)}% capacity | Draft: ${a.draft.toFixed(2)} m</div></div>
    <div class="stat-card"><div class="label">GM (Metacentric Height)</div><div class="value ${gmClass}">${a.gm.toFixed(2)} m</div><div class="sub">${gmStatus} | KB:${a.kb.toFixed(2)} BM:${a.bm.toFixed(2)} KG:${a.kg.toFixed(2)}</div></div>
    <div class="stat-card"><div class="label">Trim / Heel</div><div class="value">${a.trim.toFixed(3)} m / ${a.heel.toFixed(2)}\u00B0</div><div class="sub">LCG from midship: ${a.lcg.toFixed(2)} m</div></div>
    <div class="stat-card"><div class="label">IMO Compliance</div><div class="value ${a.imoOk?'status-ok':'status-fail'}">${a.imoOk?'COMPLIANT':'NON-COMPLIANT'}</div><div class="sub">MSC.267(85) Part A, Ch 2.2</div></div>
    <div class="stat-card"><div class="label">CG Position</div><div class="value">${a.cg_x.toFixed(1)}% / ${a.cg_y.toFixed(1)}%</div><div class="sub">Longitudinal / Transverse</div></div>
  `;
  function imoRow(name, val, min, unit) {
    const ok = val >= min;
    return `<tr><td>${name}</td><td>${val.toFixed(4)} ${unit}</td><td style="color:var(--muted)">min ${min} ${unit}</td><td class="${ok?'status-ok':'status-fail'}">${ok?'OK':'FAIL'}</td></tr>`;
  }
  document.getElementById('imo-table').innerHTML = `
    ${imoRow('GM', a.gm, 0.15, 'm')}
    ${imoRow('GZ at 30\u00B0', a.gz30, 0.20, 'm')}
    <tr><td>Max GZ angle</td><td>${a.gzMaxAngle.toFixed(0)}\u00B0</td><td style="color:var(--muted)">min 25\u00B0</td><td class="${a.gzMaxAngle>=25?'status-ok':'status-fail'}">${a.gzMaxAngle>=25?'OK':'FAIL'}</td></tr>
    ${imoRow('Area 0-30\u00B0', a.a030, 0.055, 'm-rad')}
    ${imoRow('Area 0-40\u00B0', a.a040, 0.090, 'm-rad')}
    ${imoRow('Area 30-40\u00B0', a.a3040, 0.030, 'm-rad')}
  `;
  let rows = '<tr><th>ID</th><th>Type</th><th>Weight (t)</th><th>Dims</th><th>Bin</th><th>Position</th><th>Status</th></tr>';
  for (const c of items) {
    const placed = c.px >= 0;
    rows += `<tr><td>${c.id}</td><td>${c.type}</td><td>${(c.weight/1000).toFixed(1)}</td><td>${c.dims.join('x')}</td><td>${placed ? c.bin : '-'}</td><td>${placed ? `(${c.px.toFixed(1)}, ${c.py.toFixed(1)}, ${c.pz.toFixed(1)})` : '-'}</td><td class="${placed?'status-ok':'status-fail'}">${placed?'Placed':'Failed'}</td></tr>`;
  }
  document.getElementById('cargo-table').innerHTML = rows;
  drawLayout(ship, items);
}

function drawLayout(ship, items) {
  const canvas = document.getElementById('viz');
  const rect = canvas.getBoundingClientRect();
  canvas.width = rect.width * (window.devicePixelRatio || 1);
  canvas.height = rect.height * (window.devicePixelRatio || 1);
  const ctx = canvas.getContext('2d');
  ctx.scale(window.devicePixelRatio||1, window.devicePixelRatio||1);
  const W = rect.width, H = rect.height;
  ctx.fillStyle = '#0f1117';
  ctx.fillRect(0, 0, W, H);
  const pad = 30;
  const scaleX = (W - pad*2) / ship.length;
  const scaleY = (H - pad*2) / ship.width;
  ctx.strokeStyle = '#2a2d3a'; ctx.lineWidth = 1;
  ctx.strokeRect(pad, pad, ship.length*scaleX, ship.width*scaleY);
  ctx.strokeStyle = '#1e2030'; ctx.setLineDash([4,4]);
  ctx.strokeRect(pad, pad, ship.length*0.3*scaleX, ship.width*0.8*scaleY);
  ctx.strokeRect(pad+ship.length*0.7*scaleX, pad, ship.length*0.3*scaleX, ship.width*0.8*scaleY);
  ctx.setLineDash([]);
  ctx.fillStyle = '#555'; ctx.font = '10px monospace';
  ctx.fillText('FwdHold', pad+4, pad+12);
  ctx.fillText('AftHold', pad+ship.length*0.7*scaleX+4, pad+12);
  ctx.fillText('Deck', pad+ship.length*0.35*scaleX, pad+12);
  const colors = { standard:'#4f8ff7', hazardous:'#f87171', reefer:'#34d399', fragile:'#fbbf24', heavy:'#fb923c', bulk:'#a78bfa' };
  for (const c of items) {
    if (c.px < 0) continue;
    const x = pad + c.px * scaleX, y = pad + c.py * scaleY;
    const w = c.dims[0] * scaleX, h = c.dims[1] * scaleY;
    ctx.fillStyle = colors[c.type] || '#4f8ff7'; ctx.globalAlpha = 0.6;
    ctx.fillRect(x, y, Math.max(w, 2), Math.max(h, 2));
    ctx.globalAlpha = 1; ctx.strokeStyle = colors[c.type] || '#4f8ff7'; ctx.lineWidth = 1;
    ctx.strokeRect(x, y, Math.max(w, 2), Math.max(h, 2));
    if (w > 30) { ctx.fillStyle = '#fff'; ctx.font = '9px monospace'; ctx.fillText(c.id.substring(0,10), x+2, y+10); }
  }
  ctx.globalAlpha = 1;
  let lx = pad;
  for (const [type, col] of Object.entries(colors)) {
    ctx.fillStyle = col; ctx.fillRect(lx, H-16, 8, 8);
    ctx.fillStyle = '#8b8fa3'; ctx.font = '9px monospace'; ctx.fillText(type, lx+12, H-8);
    lx += ctx.measureText(type).width + 24;
  }
  ctx.fillStyle = '#555'; ctx.font = '9px monospace';
  ctx.fillText('0m', pad, H-20);
  ctx.fillText(`${ship.length}m`, pad+ship.length*scaleX-20, H-20);
}

loadSample();
</script>
