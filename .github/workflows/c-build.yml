name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build-and-test:
    name: build & test (${{ matrix.cc }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        cc: [gcc, clang]
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Compiler version
        run: ${{ matrix.cc }} --version

      # Build and run the unit tests with warnings promoted to errors.
      - name: Build + unit tests (warnings as errors)
        run: make CC=${{ matrix.cc }} WERROR=1 test

      # Smoke-test the binary on the bundled scenarios.
      - name: Run sample scenario
        run: ./cargoforge examples/sample_ship.cfg examples/sample_cargo.txt

      - name: Run realistic scenario
        run: ./cargoforge examples/realistic_ship.cfg examples/realistic_cargo.txt

  static-analysis:
    name: Clang static analyzer
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Run the Clang static analyzer
        run: make analyze

  sanitizers:
    name: AddressSanitizer + UBSan
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Build sanitized binary
        run: make CC=clang sanitize

      # halt_on_error makes UBSan failures fatal so CI actually catches them.
      - name: Run scenarios under sanitizers
        env:
          ASAN_OPTIONS: detect_leaks=1
          UBSAN_OPTIONS: halt_on_error=1:print_stacktrace=1
        run: |
          ./cargoforge-san examples/sample_ship.cfg examples/sample_cargo.txt
          ./cargoforge-san examples/realistic_ship.cfg examples/realistic_cargo.txt
          ./cargoforge-san examples/sample_ship.cfg examples/large_cargo.txt
