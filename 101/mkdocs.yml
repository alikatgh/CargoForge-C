site_name: CargoForge-C 101
site_description: From zero to systems & naval-architecture engineer, on a real codebase
docs_dir: lessons
use_directory_urls: true

theme:
  name: material
  font:
    text: Inter
    code: JetBrains Mono
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: white
      accent: teal
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: teal
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.top
    - navigation.tracking
    - navigation.footer
    - toc.follow
    - content.code.copy
    - search.suggest
    - search.highlight

extra_css:
  - assets/extra.css
  - assets/widgets/_core.css
extra_javascript:
  - assets/sidebar-toggle.js
  - assets/mathjax.js
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js
  - assets/widgets/_core.js
  - assets/widgets/cg-balance-beam.js
  - assets/widgets/gm-stability-explorer.js
  - assets/widgets/free-surface-explorer.js
  - assets/widgets/hydro-interpolation-explorer.js

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - footnotes
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.arithmatex:
      generic: true

plugins:
  - search

nav:
  - Welcome: index.md
  - "1 · Programming foundations (C)":
      - 01-why-c-and-the-toolchain.md
      - 02-your-first-c-program.md
